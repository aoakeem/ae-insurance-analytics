version: 2

sources:
  - name: insurance
    description: Raw insurance data loaded from CSV seeds into the raw schema.
    schema: raw
    tables:
      - name: raw_customers_2hr
        identifier: raw_customers_2hr
        description: Customer master. One row per customer.
        columns:
          - name: customer_id
            description: Customer ID.
            data_tests:
              - unique
              - not_null
          - name: customer_name
            description: Full name.
            data_tests:
              - not_null
          - name: state
            description: Two-letter US state code.
          - name: age
            description: Age in years.
          - name: customer_segment
            description: Segment label (e.g. High Value, Standard).

      - name: raw_policies_2hr
        identifier: raw_policies_2hr
        description: Policies issued to customers. One row per policy.
        columns:
          - name: policy_id
            description: Policy ID.
            data_tests:
              - unique
              - not_null
          - name: customer_id
            description: FK to customer.
            data_tests:
              - not_null
              - relationships:
                  arguments:
                    to: source('insurance', 'raw_customers_2hr')
                    field: customer_id
          - name: policy_number
            description: Policy number (e.g. POL-001-AUTO).
            data_tests:
              - unique
              - not_null
          - name: policy_type
            description: Line of business (Auto, Home, Life, Health).
          - name: coverage_amount
            description: Max coverage in USD.
          - name: annual_premium
            description: Annual premium in USD.
          - name: policy_start_date
            description: Policy effective date.
          - name: policy_status
            description: Active, Cancelled, Expired, or Pending.

      - name: raw_claims_2hr
        identifier: raw_claims_2hr
        description: Claims filed against policies. One row per claim.
        columns:
          - name: claim_id
            description: Claim ID.
            data_tests:
              - unique
              - not_null
          - name: policy_id
            description: FK to policy.
            data_tests:
              - not_null
              - relationships:
                  arguments:
                    to: source('insurance', 'raw_policies_2hr')
                    field: policy_id
          - name: claim_number
            description: Claim number (e.g. CLM-001).
            data_tests:
              - unique
              - not_null
          - name: claim_date
            description: Date filed.
          - name: claim_category
            description: Claim type (Collision, Property, Medical, etc.).
          - name: claim_amount
            description: Amount claimed in USD.
          - name: claim_status
            description: Settled, Pending, Denied, or In Review.
          - name: settlement_date
            description: Settlement date. NULL if unsettled.
          - name: settlement_amount
            description: Amount paid on settlement in USD.
          - name: days_to_settlement
            description: Days from claim to settlement.

      - name: raw_transactions_2hr
        identifier: raw_transactions_2hr
        description: Financial transactions on policies. One row per transaction.
        columns:
          - name: transaction_id
            description: Transaction ID.
            data_tests:
              - unique
              - not_null
          - name: policy_id
            description: FK to policy.
            data_tests:
              - not_null
              - relationships:
                  arguments:
                    to: source('insurance', 'raw_policies_2hr')
                    field: policy_id
          - name: transaction_date
            description: Date recorded.
          - name: transaction_type
            description: Premium Payment, Refund, etc.
          - name: transaction_amount
            description: Amount in USD.
          - name: transaction_status
            description: Completed, Pending, or Failed.
